<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VietlottAI">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="VietlottAI">
<meta name="theme-color" id="themeColor" content="#03030f">
<title>VietlottAI – Dự Đoán Xổ Số Thông Minh</title>
<style>
  :root {
    --bg: #03030f; --card: #12121e; --text: #e0e0e0; --accent: #ff3b3f;
    --gold: linear-gradient(135deg, #ffd700, #ff8c00);
    --glass: rgba(255, 255, 255, 0.05);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text); overflow-x: hidden;
    user-select: none; -webkit-user-select: none;
  }
  /* Splash Screen */
  #splash {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: var(--bg); z-index: 9999; display: flex; flex-direction: column;
    align-items: center; justify-content: center; transition: opacity 0.8s ease;
  }
  #splash.hide { opacity: 0; pointer-events: none; }
  .loader {
    width: 60px; height: 60px; border: 4px solid var(--glass);
    border-top: 4px solid var(--accent); border-radius: 50%;
    animation: spin 1s linear infinite; margin-bottom: 20px;
  }
  @keyframes spin { 100% { transform: rotate(360deg); } }

  /* Main Layout */
  .container { padding: 20px; max-width: 500px; margin: 0 auto; padding-bottom: 100px; }
  header { text-align: center; margin-bottom: 30px; }
  h1 { font-size: 24px; margin: 0; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

  .card {
    background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 20px;
    border: 1px solid var(--glass); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  .label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: block; }
  
  /* Jackpot UI */
  .jp-container { display: flex; align-items: baseline; gap: 8px; margin-bottom: 15px; }
  .jp-value { font-size: 28px; font-weight: 800; color: #fff; }
  .jp-unit { color: var(--accent); font-weight: bold; }
  .meter-bg { height: 6px; background: #222; border-radius: 3px; overflow: hidden; position: relative; }
  .meter-fill { height: 100%; background: var(--accent); width: 0%; transition: width 1.5s cubic-bezier(0.1, 0.9, 0.2, 1); }

  /* Balls UI */
  .ball-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; justify-content: center; }
  .ball {
    width: 38px; height: 38px; border-radius: 50%; background: #fff; color: #000;
    display: flex; align-items: center; justify-content: center; font-weight: bold;
    font-size: 14px; box-shadow: inset -3px -3px 6px rgba(0,0,0,0.2);
    animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
  }
  @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
  .ball.red { background: radial-gradient(circle at 30% 30%, #ff5f6d, #ff3b3f); color: white; }
  .ball.blue { background: radial-gradient(circle at 30% 30%, #2196f3, #0d47a1); color: white; }

  /* Controls */
  .btn-group { display: flex; gap: 10px; margin-top: 20px; }
  button {
    flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: bold;
    cursor: pointer; transition: 0.2s; background: var(--glass); color: #fff;
  }
  button:active { transform: scale(0.95); opacity: 0.8; }
  .btn-primary { background: var(--accent); }

  /* Fixed Bottom Nav for Actions */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(18,18,30,0.9);
    backdrop-filter: blur(10px); padding: 15px; border-top: 1px solid var(--glass);
    display: flex; justify-content: space-around; z-index: 1000;
  }
  .nav-item { font-size: 20px; color: #888; cursor: pointer; }
  .nav-item.active { color: var(--accent); }
</style>
</head>
<body>

<div id="splash">
  <div class="loader"></div>
  <div style="font-weight: bold; letter-spacing: 2px;">VIETLOTT AI IS LOADING...</div>
  <div id="status" style="margin-top:10px; font-size:12px; color:#555;">Đang tải thuật toán xác suất...</div>
</div>

<div class="container">
  <header>
    <h1>VIETLOTT AI PRO</h1>
    <p style="font-size: 11px; color: #666;">Hệ Thống Dự Đoán Xử Lý Bằng Trí Tuệ Nhân Tạo</p>
  </header>

  <div class="card">
    <span class="label">Mega 6/45 - Jackpot Ước Tính</span>
    <div class="jp-container">
      <span id="mega-val" class="jp-value">12.0</span>
      <span class="jp-unit">TỶ VNĐ</span>
    </div>
    <div class="meter-bg"><div id="mega-meter" class="meter-fill"></div></div>
    <div id="mega-balls" class="ball-row"></div>
    <div class="btn-group">
      <button onclick="generate('mega')">AI GENERATE</button>
    </div>
  </div>

  <div class="card">
    <span class="label">Power 6/55 - Jackpot 1</span>
    <div class="jp-container">
      <span id="power-val" class="jp-value">30.0</span>
      <span class="jp-unit">TỶ VNĐ</span>
    </div>
    <div class="meter-bg"><div id="power-meter" class="meter-fill"></div></div>
    <div id="power-balls" class="ball-row"></div>
    <div class="btn-group">
      <button onclick="generate('power')" class="btn-primary">AI ANALYZE</button>
    </div>
  </div>

  <div class="card">
    <span class="label">Keno - Bậc 10</span>
    <div id="keno-balls" class="ball-row"></div>
    <button style="width:100%; margin-top:15px;" onclick="generate('keno')">QUAY NHANH KENO</button>
  </div>

  <div class="card">
    <span class="label">Max 3D Pro</span>
    <div id="max3dpro-balls" class="ball-row" style="font-size: 20px; font-weight: 800; letter-spacing: 5px;">
      <span id="m3dp-1">000</span> - <span id="m3dp-2">000</span>
    </div>
    <button style="width:100%; margin-top:15px;" onclick="generate('max3dpro')">CHỐT SỐ MAX3D</button>
  </div>
</div>

<div class="bottom-nav">
  <div class="nav-item" onclick="toggleFullScreen()">⛶</div>
  <div class="nav-item" onclick="playSound('click')">🔔</div>
  <div class="nav-item" onclick="location.reload()">🔄</div>
</div>

<audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
<audio id="snd-win" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

<script>
/* LOGIC AI & ALGORITHMS 
  Thuật toán mô phỏng dựa trên trọng số (Weighting Algorithm) 
*/
const AI_ENGINE = {
    // Tạo mảng số với trọng số ngẫu nhiên (giả lập số "nóng" và "nguội")
    getWeightedRandom: (max, count) => {
        let pool = [];
        for (let i = 1; i <= max; i++) {
            // Mỗi số được đưa vào pool với số lần xuất hiện khác nhau để tạo xác suất AI
            let weight = Math.floor(Math.random() * 5) + 1; 
            for (let j = 0; j < weight; j++) pool.push(i);
        }
        let results = new Set();
        while(results.size < count) {
            let idx = Math.floor(Math.random() * pool.length);
            results.add(pool[idx]);
        }
        return Array.from(results).sort((a, b) => a - b);
    },
    
    predict: (type) => {
        if(type === 'mega') return AI_ENGINE.getWeightedRandom(45, 6);
        if(type === 'power') return AI_ENGINE.getWeightedRandom(55, 6);
        if(type === 'keno') return AI_ENGINE.getWeightedRandom(80, 20);
        if(type === 'max3dpro') {
            const n1 = Math.floor(Math.random() * 1000).toString().padStart(3, '0');
            const n2 = Math.floor(Math.random() * 1000).toString().padStart(3, '0');
            return [n1, n2];
        }
    }
};

/* SYSTEM FUNCTIONS */
function playSound(type) {
    const s = document.getElementById(type === 'click' ? 'snd-click' : 'snd-win');
    if(s) { s.currentTime = 0; s.play().catch(()=>{}); }
}

function triggerHaptic() {
    if ("vibrate" in navigator) {
        navigator.vibrate([30, 50, 30]); // Kiểu rung kép nhẹ
    }
}

function toggleFullScreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(e => {});
    } else {
        if (document.exitFullscreen) document.exitFullscreen();
    }
}

/* UI RENDERING */
function renderBalls(containerId, numbers, isRed = false) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    numbers.forEach((n, index) => {
        setTimeout(() => {
            const b = document.createElement('div');
            b.className = `ball ${isRed ? 'red' : ''}`;
            b.textContent = n < 10 && typeof n === 'number' ? '0' + n : n;
            container.appendChild(b);
            if(index === numbers.length - 1) playSound('win');
        }, index * 100);
    });
}

function generate(type) {
    triggerHaptic();
    playSound('click');
    const nums = AI_ENGINE.predict(type);
    
    if(type === 'mega') renderBalls('mega-balls', nums, true);
    if(type === 'power') renderBalls('power-balls', nums, true);
    if(type === 'keno') renderBalls('keno-balls', nums.slice(0, 10)); // Hiện 10 số đại diện
    if(type === 'max3dpro') {
        document.getElementById('m3dp-1').textContent = nums[0];
        document.getElementById('m3dp-2').textContent = nums[1];
    }
}

/* INITIALIZATION */
window.addEventListener('DOMContentLoaded', () => {
    // Giả lập cập nhật Jackpot
    const megaJP = (Math.random() * (100 - 12) + 12).toFixed(1);
    const powerJP = (Math.random() * (300 - 30) + 30).toFixed(1);
    
    document.getElementById('mega-val').textContent = megaJP;
    document.getElementById('power-val').textContent = powerJP;
    
    // Thanh đo % (giả lập tỷ lệ tích lũy)
    setTimeout(() => {
        document.getElementById('mega-meter').style.width = (megaJP / 100 * 100) + '%';
        document.getElementById('power-meter').style.width = (powerJP / 300 * 100) + '%';
    }, 4500);

    // Tắt Splash screen sau 4s
    setTimeout(() => {
        document.getElementById('splash').classList.add('hide');
        // Tự động tạo số lần đầu
        generate('mega');
        generate('power');
    }, 4000);
});
</script>
</body>
</html>
